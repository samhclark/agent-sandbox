name: Build agent sandbox image

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '23 8 * * *'  # Daily at 8:23 AM UTC

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build, sign, and push
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Fail fast if the vendored Homebrew installer has drifted from upstream,
      # so a stale bootstrap script never ships. The daily "Update vendored
      # Homebrew installer" workflow opens a PR that clears this.
      - name: Verify vendored Homebrew installer is current
        run: |
          curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh -o /tmp/install-homebrew-upstream.sh
          if ! diff -u scripts/install-homebrew.sh /tmp/install-homebrew-upstream.sh; then
            echo "::error::scripts/install-homebrew.sh is out of date. Run 'make deps-update' (or merge the daily re-vendor PR)."
            exit 1
          fi
          echo "Vendored Homebrew installer matches upstream."

      # arm64 is cross-built under emulation on the amd64 runner. Installing
      # qemu-user-static registers the binfmt handlers buildah needs.
      - name: Enable arm64 emulation
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static

      - name: Build image
        id: build
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2.13
        with:
          image: ${{ env.IMAGE_NAME }}
          tags: latest
          archs: amd64, arm64
          containerfiles: |
            ./Containerfile

      - name: Log in to Container Registry
        if: ${{ github.event_name != 'pull_request' }}
        uses: redhat-actions/podman-login@4934294ad0449894bcd1e9f191899d7292469603 # v1.7
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to registry
        id: push
        if: ${{ github.event_name != 'pull_request' }}
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c # v2.8
        with:
          image: ${{ steps.build.outputs.image }}
          tags: ${{ steps.build.outputs.tags }}
          registry: ${{ env.REGISTRY }}

      - name: Generate artifact attestation
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

      - name: Sign the published OCI image
        if: ${{ github.event_name != 'pull_request' }}
        uses: samhclark/cosign-exec-action@3d636c269e98ac0b9d5812324e8d1e86ca108e02 # v1.0.16
        with:
          registry-token: ${{ secrets.GITHUB_TOKEN }}
          args: >-
            sign --yes --recursive --new-bundle-format=false --use-signing-config=false
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
